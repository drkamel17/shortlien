<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختصر رابطك</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🔗 اختصر رابطك</h1>
        <p class="subtitle">أدخل الرابط الطويل للحصول على رابط مختصر</p>
        
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="https://example.com/very-long-url..." required>
            <button onclick="shortenUrl()">اختصر</button>
        </div>
        
        <div id="result" class="result hidden">
            <p>الرابط المختصر:</p>
            <input type="text" id="shortUrl" readonly onclick="this.select()">
            <button class="copy-btn" onclick="copyToClipboard()">نسخ</button>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
